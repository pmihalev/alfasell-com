# AlfaSell static site — served on :8080 (Fly internal_port).
# Cloudflare sits in front as the CDN/cache; this origin sets sane cache
# headers so the proxy can cache aggressively while HTML stays fresh.

server {
  listen 8080;
  listen [::]:8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip for text assets (Cloudflare also compresses, belt + suspenders).
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

  # Hashed/static assets → cache hard.
  location /_astro/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location ~* \.(svg|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # HTML → short cache, always revalidate (so deploys go live fast).
  location / {
    add_header Cache-Control "public, max-age=0, must-revalidate";
    try_files $uri $uri/ $uri.html /index.html;
  }

  # Lightweight health endpoint for Fly checks.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }
}
